c39126e0-59f5-492b-ad6e-baa2490f80ad=[example]\r\nselect d.name                as "Name" \r\n,      min(e.DateOfBirth)     as "MinDateOfBirth" \r\n,      max(e.DateOfBirth)     as "MaxDateOfBirth" \r\n,      sum(e.Salary)          as "TotalSalary" \r\n,      avg(e.Salary)          as "AvgSalary" \r\n,      min(e.Salary)          as "MinSalary" \r\nfrom   testmodule$department as d\r\n  left join testmodule$employee_department as ed on (ed.testmodule$departmentid \= d.id)\r\n  left join testmodule$employee as e on (ed.testmodule$employeeid \= e.id ) \r\ngroup by d.name\r\norder by d.name
